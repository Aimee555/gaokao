<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>趋势选专业</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css"/>
</head>
<body>
<div id="root"></div>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- lucide icons (vanilla UMD; exposes window.lucide.icons) -->
<script src="https://unpkg.com/lucide@0.451.0/dist/umd/lucide.min.js"></script>

<!-- data -->
<script src="data.js"></script>

<!-- components -->
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="result.jsx"></script>

<!-- app -->
<script type="text/babel">
const { useState, useRef } = React;
const { QUESTIONS, MAJORS } = window.APP_DATA;

/* ---- scoring ---- */
function computeHolland(answers) {
  const score = { R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 };
  answers.forEach((a, i) => {
    const d = QUESTIONS[i].d;
    score[d] += a === "like" ? 2 : a === "neutral" ? 1 : 0;
  });
  const sorted = Object.keys(score).sort((a, b) => score[b] - score[a]);
  return { score, code: sorted.slice(0, 2).join("") };
}

function scoreMajor(m, { code, hollandScore, industries }) {
  let s = 56;
  const top3 = code
    ? Object.keys(hollandScore).sort((a, b) => hollandScore[b] - hollandScore[a]).slice(0, 3)
    : [];
  if (code) {
    m.holland.forEach(h => { if (top3.includes(h)) s += (3 - top3.indexOf(h)) * 7; });
  } else { s += 12; }
  let matched = [];
  if (industries && industries.length) {
    matched = m.inds.filter(id => industries.includes(id));
    s += matched.length * 13;
    if (matched.length === 0) s -= 9;
  }
  const display = matched.length ? matched : m.inds;
  s += (m.name.length % 5) * 0.6 + (m.isNew ? 2 : 0);
  s = Math.max(72, Math.min(97, s));
  return { item: m, pct: Math.round(s), matchedInds: display, _matched: matched.length };
}

function rankMajors({ code, hollandScore, industries, subject }) {
  const scored = MAJORS.map(m => scoreMajor(m, { code, hollandScore, industries }));
  const byScore = (a, b) => b.pct - a.pct || b._matched - a._matched;

  // eligible by subject: history students cannot take physics-required majors
  const eligible = scored.filter(t =>
    subject === "physics" ? true : t.item.subject !== "physics");
  const top = [...eligible].sort(byScore).slice(0, 5);

  // history students: show top physics-locked majors as opportunity cost
  let lockedPhysics = [];
  if (subject === "history") {
    lockedPhysics = scored
      .filter(t => t.item.subject === "physics")
      .sort(byScore)
      .slice(0, 3);
  }
  return { top, lockedPhysics };
}

/* ---- app ---- */
function App() {
  const [step, setStep] = useState("home");   // home | subject | quiz | industry | result
  const [subject, setSubject] = useState(null);
  const [answers, setAnswers] = useState([]);
  const [selected, setSelected] = useState([]);
  const [result, setResult] = useState(null);
  const scrollRef = useRef(null);

  function reset() { setSubject(null); setAnswers([]); setSelected([]); setResult(null); setStep("home"); }

  function start() { setSubject(null); setAnswers([]); setSelected([]); setResult(null); setStep("subject"); }

  function pickSubject(id) { setSubject(id); setAnswers([]); setStep("quiz"); }

  function answer(v) {
    if (answers.length >= QUESTIONS.length) { setStep("industry"); return; }
    const next = [...answers, v];
    if (next.length >= QUESTIONS.length) { setAnswers(next); setStep("industry"); }
    else { setAnswers(next); }
  }

  function quizBack() {
    if (answers.length > 0) setAnswers(a => a.slice(0, -1));
    else setStep("subject");
  }

  function toggleIndustry(id) {
    setSelected(s => s.includes(id) ? s.filter(x => x !== id) : (s.length >= 3 ? s : [...s, id]));
  }

  // 从产业页返回测评：撤回最后一题，回到最后一题重答（避免计数越界）
  function industryBack() { setAnswers(a => a.slice(0, -1)); setStep("quiz"); }

  function finish() {
    const h = computeHolland(answers);
    const { top, lockedPhysics } = rankMajors({ code: h.code, hollandScore: h.score, industries: selected, subject });
    setResult({ subject, hollandCode: h.code, hollandScore: h.score, industries: selected, top, lockedPhysics });
    setStep("result");
  }

  // 重选方向: keep subject + answers, return to industry select
  function reselect() { setResult(null); setStep("industry"); }

  let screen;
  if (step === "home") {
    screen = <HomeScreen onStart={start} />;
  } else if (step === "subject") {
    screen = <SubjectScreen onPick={pickSubject} onBack={reset} />;
  } else if (step === "quiz") {
    screen = <QuizScreen index={answers.length} total={QUESTIONS.length}
      question={QUESTIONS[Math.min(answers.length, QUESTIONS.length - 1)]}
      onAnswer={answer} onBack={quizBack} />;
  } else if (step === "industry") {
    screen = <IndustryScreen selected={selected} onToggle={toggleIndustry}
      onContinue={finish} onBack={industryBack} />;
  } else if (step === "result") {
    screen = <ResultScreen result={result} onRestart={reset}
      onReselect={reselect} scrollRef={scrollRef} />;
  }

  return <div className="stage">{screen}</div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
